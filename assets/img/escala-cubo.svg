<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 390" role="img" aria-labelledby="t d">
<title id="t">Efecto de un factor de escala sobre longitud, área y volumen</title><desc id="d">Un factor k multiplica longitudes por k, áreas por k al cuadrado y volúmenes por k al cubo.</desc>
<rect width="760" height="390" rx="28" fill="#f7faff"/>
<g font-family="Arial, sans-serif" text-anchor="middle">
<text x="380" y="48" font-size="25" font-weight="700" fill="#173f87">Un mismo factor produce efectos distintos</text>
<g transform="translate(55 95)"><rect width="190" height="220" rx="22" fill="#fff" stroke="#bfd1ef" stroke-width="3"/><path d="M40 105h110" stroke="#2b65c8" stroke-width="12" stroke-linecap="round"/><text x="95" y="45" font-size="20" font-weight="700" fill="#173f87">LONGITUD</text><text x="95" y="165" font-size="42" font-weight="700" fill="#2b65c8">× k</text><text x="95" y="198" font-size="14" fill="#4b607f">escala lineal</text></g>
<g transform="translate(285 95)"><rect width="190" height="220" rx="22" fill="#fff" stroke="#bfd1ef" stroke-width="3"/><rect x="55" y="76" width="80" height="80" rx="8" fill="#86a8de"/><text x="95" y="45" font-size="20" font-weight="700" fill="#173f87">ÁREA</text><text x="95" y="185" font-size="42" font-weight="700" fill="#2b65c8">× k²</text><text x="95" y="210" font-size="14" fill="#4b607f">dos dimensiones</text></g>
<g transform="translate(515 95)"><rect width="190" height="220" rx="22" fill="#fff" stroke="#bfd1ef" stroke-width="3"/><path d="M60 82h66v66H60zM60 82l28-24h66v66l-28 24M126 82l28-24M126 148l28-24" fill="#dce9ff" stroke="#2b65c8" stroke-width="4" stroke-linejoin="round"/><text x="95" y="45" font-size="20" font-weight="700" fill="#173f87">VOLUMEN</text><text x="95" y="185" font-size="42" font-weight="700" fill="#2b65c8">× k³</text><text x="95" y="210" font-size="14" fill="#4b607f">tres dimensiones</text></g>
<text x="380" y="358" font-size="18" fill="#4b607f">Duplicar el lado no duplica el volumen: lo multiplica por 8.</text>
</g></svg>
