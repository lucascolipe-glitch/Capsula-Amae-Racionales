<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 430" role="img" aria-labelledby="t d"><title id="t">Rompecabezas ampliado mediante un factor siete cuartos</title><desc id="d">Un cuadrado dividido en seis piezas ilustra que todas las longitudes deben escalarse con el mismo factor.</desc><rect width="700" height="430" rx="28" fill="#f7faff"/><g transform="translate(105 70)" fill="#fff" stroke="#173f87" stroke-width="5"><rect width="330" height="280"/><path d="M0 160L165 0M165 0V280M165 80H330M165 80L330 225M225 135V280"/></g><g font-family="Arial" font-size="22" font-weight="700" fill="#173f87"><text x="185" y="145">A</text><text x="360" y="120">B</text><text x="375" y="210">C</text><text x="340" y="310">D</text><text x="285" y="245">E</text><text x="170" y="290">F</text></g><g transform="translate(500 115)" font-family="Arial" text-anchor="middle"><circle cx="70" cy="70" r="68" fill="#173f87"/><text x="70" y="58" font-size="20" fill="#dce9ff">factor</text><text x="70" y="105" font-size="50" font-weight="700" fill="#fff">7/4</text><text x="70" y="180" font-size="17" fill="#4b607f">cada pieza debe conservar</text><text x="70" y="204" font-size="17" fill="#4b607f">forma y relaciones</text></g></svg>
